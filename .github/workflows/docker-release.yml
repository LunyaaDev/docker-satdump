name: Build Docker Image

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - "main"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_release.outputs.version }}
      sha_short: ${{ steps.get_sha.outputs.sha_short }}
      should_continue: ${{ steps.check.outputs.should_continue }}
    steps:
      - name: Get latest release tag
        id: get_release
        run: |
          curl -s https://api.github.com/repos/SatDump/SatDump/releases/latest \
            | jq -r '.tag_name' > version.txt
          echo "version=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Declare some variables
        id: get_sha
        run: |
          sha_hash=${{ github.sha }}
          echo "sha_short="${sha_hash:0:7}"" >> $GITHUB_OUTPUT

      - name: Version
        run: |
          echo "${{ steps.get_release.outputs.version }}-${{ steps.get_sha.outputs.sha_short }}"

      - name: Check if image already exists
        id: check
        run: |
          if docker manifest inspect lunyaadev/satdump:${{ steps.get_release.outputs.version }}-${{ steps.get_sha.outputs.sha_short }} > /dev/null 2>&1; then
            echo "should_continue=false" >> $GITHUB_OUTPUT
          else
            echo "should_continue=true" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_continue == 'true'
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            SATDUMP_VERSION=${{ needs.check.outputs.version }}
          tags: |
            lunyaadev/satdump:${{ needs.check.outputs.version }}-${{ needs.check.outputs.sha_short }}
            lunyaadev/satdump:${{ needs.check.outputs.version }}
            lunyaadev/satdump:latest
